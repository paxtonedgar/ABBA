"""Auth roles."""
enum UserRole { OWNER AGENT }

"""Lifecycle of a listing."""
enum PropertyStatus { DRAFT SUBMITTED UNDER_REVIEW APPROVED REJECTED }

"""Inventory type."""
enum PropertyType { HOUSE APARTMENT CONDO CABIN VILLA TOWNHOUSE OTHER }

"""Bed taxonomy (extend as needed)."""
enum BedType { KING QUEEN FULL TWIN SOFA_BED_FULL SOFA_BED_QUEEN BUNK TWIN_XL CRIB AIR_MATTRESS }

"""Sortable fields for properties."""
enum PropertySortBy { SUBMITTED_AT CREATED_AT UPDATED_AT TITLE CITY REGION MAX_GUESTS }

enum SortDirection { ASC DESC }

"""Authenticated user (owner or agent)."""
type User implements Node {
  id: ID!
  role: UserRole!
  name: String!
  email: String!
  phone: String
  createdAt: DateTime!
  updatedAt: DateTime!
  properties(
    filter: PropertyFilter, sort: PropertySortInput
  ): [Property!] @auth(requires: OWNER)
}

"""A vacation rental listing submitted to Evolve."""
type Property implements Node {
  id: ID!
  owner: User!
  title: String!
  type: PropertyType!
  descriptionShort: String
  descriptionLong: String
  maxGuests: Int
  bathroomsTotal: Float

  # Address & geocode
  addressLine1: String!
  addressLine2: String
  city: String!
  region: String!
  postalCode: String!
  country: String!
  latitude: Float
  longitude: Float

  # Policies
  checkinTime: Time
  checkoutTime: Time
  minNights: Int
  maxNights: Int
  petsAllowed: Boolean!
  smokingAllowed: Boolean!
  houseRules: String

  # Workflow
  status: PropertyStatus!
  submittedAt: DateTime
  reviewedBy: User
  reviewedAt: DateTime
  reviewNotes: String

  # Edges
  rooms: [Room!]!
  amenities: [PropertyAmenity!]!

  createdAt: DateTime!
  updatedAt: DateTime!
}

"""A physical room inside a property."""
type Room implements Node {
  id: ID!
  property: Property!
  name: String!
  floorLabel: String
  areaSqFt: Int
  ensuiteBath: Boolean
  beds: [RoomBed!]!
  notes: String
  createdAt: DateTime!
  updatedAt: DateTime!
}

"""A structured bed entry."""
type RoomBed {
  type: BedType!
  count: Int!
}

"""Amenity dictionary row."""
type Amenity implements Node {
  id: ID!
  code: String!
  name: String!
  category: String!
  createdAt: DateTime!
}

"""Edge: Property ↔ Amenity with optional structured details."""
type PropertyAmenity implements Node {
  id: ID!
  property: Property!
  amenity: Amenity!
  details: JSON
}

"""Wizard draft payloads (optional)."""
type PropertyDraft implements Node {
  id: ID!
  owner: User!
  property: Property
  step: String!
  payload: JSON!
  createdAt: DateTime!
  updatedAt: DateTime!
}

interface Node { id: ID! }


input PropertySortInput {
  by: PropertySortBy! = CREATED_AT
  direction: SortDirection! = DESC
}


input PropertyFilter {
  ids: [ID!]
  ownerId: ID
  statusIn: [PropertyStatus!]
  typeIn: [PropertyType!]
  cityEq: String
  regionEq: String
  countryEq: String
  petsAllowed: Boolean
  smokingAllowed: Boolean
  minGuestsGte: Int
  minBathroomsGte: Float
  amenitiesAllOf: [String!]
  amenitiesAnyOf: [String!]
  createdFrom: DateTime
  createdTo: DateTime
  submittedFrom: DateTime
  submittedTo: DateTime
  latMin: Float
  latMax: Float
  lonMin: Float
  lonMax: Float
  fullText: String
}

input RoomFilter {
  propertyId: ID
  nameContains: String
  ensuiteBath: Boolean
  bedAnyOf: [BedType!]
}

input AmenityFilter {
  codeIn: [String!]
  categoryIn: [String!]
  q: String
}

type Query {
  node(id: ID!): Node

  me: User!

  property(id: ID!): Property

  properties(
    filter: PropertyFilter,
    sort: PropertySortInput
  ): [Property!]!

  myProperties(
    filter: PropertyFilter,
    sort: PropertySortInput
  ): [Property!]! @auth(requires: OWNER)

  agentQueue(
    filter: PropertyFilter,
    sort: PropertySortInput
  ): [Property!]! @auth(requires: AGENT)

  amenities(filter: AmenityFilter): [Amenity!]!

  rooms(filter: RoomFilter): [Room!]!

  propertyCountsByStatus: [CountByKey!]! @auth(requires: AGENT)
  topAmenities(limit: Int = 20): [CountByKey!]!
  propertiesByRegion(limit: Int = 20): [CountByKey!]!
}

type CountByKey {
  key: String!
  count: Int!
}

input CreatePropertyInput {
  title: String!
  type: PropertyType = OTHER
  descriptionShort: String
  descriptionLong: String
  maxGuests: Int
  bathroomsTotal: Float
  addressLine1: String!
  addressLine2: String
  city: String!
  region: String!
  postalCode: String!
  country: String!
  latitude: Float
  longitude: Float
  checkinTime: Time
  checkoutTime: Time
  minNights: Int
  maxNights: Int
  petsAllowed: Boolean = false
  smokingAllowed: Boolean = false
  houseRules: String
}

input UpsertRoomsInput {
  propertyId: ID!
  rooms: [RoomUpsert!]!
}

input RoomUpsert {
  id: ID
  name: String!
  floorLabel: String
  areaSqFt: Int
  ensuiteBath: Boolean
  beds: [RoomBedInput!]!
  notes: String
}

input RoomBedInput {
  type: BedType!
  count: Int!
}

input SetAmenitiesInput {
  propertyId: ID!
  amenities: [AmenityAttachInput!]!
}

input AmenityAttachInput {
  code: String!
  details: JSON
}

input SubmitPropertyInput { propertyId: ID! }
input ReviewPropertyInput {
  propertyId: ID!
  decision: ReviewDecision!
  notes: String
}

enum ReviewDecision { APPROVE REJECT RETURN_FOR_EDIT }

input SaveDraftInput {
  step: String!
  payload: JSON!
  propertyId: ID
}

type Mutation {
  createProperty(input: CreatePropertyInput!): Property! @auth(requires: OWNER)
  upsertRooms(input: UpsertRoomsInput!): Property! @auth(requires: OWNER)
  setAmenities(input: SetAmenitiesInput!): Property! @auth(requires: OWNER)
  submitProperty(input: SubmitPropertyInput!): Property! @auth(requires: OWNER)
  saveDraft(input: SaveDraftInput!): PropertyDraft! @auth(requires: OWNER)

  reviewProperty(input: ReviewPropertyInput!): Property! @auth(requires: AGENT)
}

scalar DateTime
scalar Time
scalar JSON

directive @auth(requires: UserRole!) on FIELD_DEFINITION
