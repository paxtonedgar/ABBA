version: 2

linters:
  enable:
    - govet         # Suspicious constructs (like SpotBugs)
    - errcheck      # Unchecked errors
    - staticcheck   # Static analysis (like SpotBugs)
    - gosec         # Security issues (like OWASP dependency check)
    - ineffassign   # Ineffective assignments
    - unused        # Dead code detection
    - gocritic      # Opinionated style/performance
    - revive        # Extended version of golint
    - misspell      # Spelling errors
    - gocyclo       # Cyclomatic complexity
    - unconvert     # Unnecessary conversions
    - prealloc      # Slice preallocation
  disable:
    - dupl          # Disabled: dataloader pattern creates acceptable duplication

formatters:
  enable:
    - gofmt         # Code formatting (like Java's formatter)
    - gofumpt       # Stricter gofmt

linters-settings:
  govet:
    check-shadowing: true
    enable-all: true
  gosec:
    severity: medium
  gocritic:
    enabled-tags:
      - performance
      - diagnostic
      - style
    disabled-checks:
      - exitAfterDefer  # Acceptable: we explicitly close client before log.Fatalf
  gocyclo:
    min-complexity: 15
  dupl:
    threshold: 150  # Increased to allow dataloader pattern similarity
  errcheck:
    check-type-assertions: true
    check-blank: true
  revive:
    rules:
      - name: var-naming
      - name: package-comments
      - name: exported
      - name: error-return
      - name: error-naming
      - name: if-return
      - name: increment-decrement
      - name: var-declaration
      - name: range

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
  # Exclude some linters from running on tests and loaders
  exclude-rules:
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
    - text: "lines are duplicate of"
      linters:
        - dupl
    - text: "exitAfterDefer.*will exit.*defer"
      linters:
        - gocritic
    - path: cmd/server/main.go
      text: "exitAfterDefer"

run:
  timeout: 5m
  tests: true
  skip-dirs:
    - node_modules
    - ent/migrate/schema.go  # Generated file
  skip-files:
    - ".*\\.gen\\.go$"
    - ".*_gen\\.go$"
    - "ent/.*"  # Skip ent generated files

output:
  format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

